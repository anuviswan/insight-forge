description: "Blog creation workflow using pre-existing research artifacts (skips research step)"
title: "Technical Blogger with Existing Research"
input:
  - Topic
  - Audience
  - WritingStyle
  - Research Artifacts
steps:
  - step: 1
    title: "Domain Analysis"
    description: |
      Provide expert domain analysis and feedback on the topic considering content quality requirements:
      - Analyze research artifacts for key findings and takeaways
      - Identify if this topic requires code examples (and which languages)
      - Flag if architectural diagrams would help reader understanding
      - Note common pitfalls and best practices to highlight
      - Recommend structure for executive summary and table of contents
      - If topic is .Net related, use skill dotnet-evangelist for domain expertise
    skills_required: []
    input:
      - Topic
      - Audience
      - WritingStyle
      - Research Artifacts
    output:
      - Domain Analysis Artifacts
  - step: 2
    title: "Create Outline"
    description: |
      Create a comprehensive outline of the document with the following structure:
      - Start with a clear, compelling title
      - Include major sections with logical flow (simple to complex)
      - Ensure coverage of all research findings
      - Plan for executive summary after title
      - Structure for table of contents
      - Identify sections requiring code snippets or diagrams
    skills_required:
      - outline
    input:
      - Research Artifacts
      - Domain Expertise
    output:
      - Article Outline
  - step: 3
    title: "Write Draft"
    description: |
      Create initial draft of the document with explicit content quality requirements:

      Structure:
      - Start with a clear, descriptive blog title
      - Include executive summary (2-3 paragraphs with key takeaways from research)
      - Add table of contents listing all major sections
      - Use appropriate heading hierarchy (H2 for sections, H3 for subsections)

      Content Enhancements:
      - Include code snippets (with language tags: ```csharp, ```javascript, etc.) when demonstrating concepts or best practices
      - Use Mermaid diagrams (```mermaid blocks) to illustrate architecture, workflows, or conceptual relationships
      - Incorporate research findings with proper attribution throughout
      - End with References section citing research sources

      Audience & Style:
      - Adapt technical depth and examples for specified Audience
      - Follow specified WritingStyle (Professional, Casual, Technical)
    skills_required:
      - writer
    input:
      - Outline
      - Audience
      - WritingStyle
      - Research Artifacts
    output:
      - Draft Article
  - step: 4
    title: "SEO Optimization"
    description: "SEO Optimize the article draft"
    skills_required:
      - seo
    input:
      - Draft Article
    output:
      - SEO Optimized Article
  - step: 5
    title: "Originality check"
    description: "Review the article for originality and refine until satisfied"
    skills_required:
      - originality-check
    process:
      - "Review the Article until originality check succeeds"
      - "Use review feedback for refining article"
  - step: 6
    title: "Final Output"
    description: "Produce the final output"

output_folders:
  - ./output
